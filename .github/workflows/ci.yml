name: quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API · Python 3.12
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      LLM_MODE: mock
      AUTO_SEED: "false"
      DATABASE_URL: sqlite:///./ci.sqlite3
      SEC_USER_AGENT: DealLens CI contact@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/api/requirements.lock
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-build-isolation --no-deps -e .
      - run: python -m pip install pytest==9.1.1 ruff==0.15.21
      - run: python -m pip check
      - name: Lint
        run: python -m ruff check src tests migrations
      - name: Migrate a blank database
        run: python -m alembic -c alembic.ini upgrade head
      - name: Assert migration metadata is current
        run: python -m alembic -c alembic.ini check
      # Explicit retrieval-eval + abstention-calibration gate (G03/G06). These are ordinary
      # pytest tests, so the full "Test" step below already runs them; this step surfaces the
      # regression gate as its own CI signal — it fails if any ranker slips below the committed
      # baseline in src/eval/retrieval_metrics.json or the calibrated thresholds drift.
      - name: Retrieval eval + calibration gate
        env:
          DATABASE_URL: sqlite:///./ci-eval.sqlite3
          SCHEMA_MANAGEMENT: create_all
        run: python -m pytest tests/test_retrieval_eval.py tests/test_calibration.py -q
      # G37 — Performance smoke. An ordinary pytest module (so the full "Test" step below already
      # runs it), surfaced here as its own signal: it exercises each hot endpoint in-process 20×
      # and fails if measured p95 exceeds the budget in perf/perf_budget.json. Fully offline — the
      # heavier concurrent load test is the committed k6 script (perf/k6_load_test.js), run out of
      # CI. See perf/README.md.
      - name: Performance smoke
        env:
          DATABASE_URL: sqlite:///./ci-perf.sqlite3
          SCHEMA_MANAGEMENT: create_all
        run: python -m pytest tests/test_perf_smoke.py -q
      - name: Test
        env:
          DATABASE_URL: sqlite:///./ci-tests.sqlite3
          SCHEMA_MANAGEMENT: create_all
        run: python -m pytest

  api-postgres:
    name: API · Postgres 16
    # G36 — Postgres CI matrix. Runs the identical backend suite against a real
    # Postgres 16 service container (the `api` job above covers SQLite). The key extra
    # signal is `alembic upgrade head` executing every migration on real Postgres, which
    # catches the class of dialect-specific bugs SQLite hides (e.g. the 63-char identifier
    # truncation the earlier audit found). Green here is required for merge.
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      LLM_MODE: mock
      AUTO_SEED: "false"
      SEC_USER_AGENT: DealLens CI contact@example.com
      # Alembic + the app read the dialect from DATABASE_URL; point it at the service below.
      DATABASE_URL: postgresql+psycopg://deallens:deallens@localhost:5432/deallens
    services:
      # Mirrors the docker-compose `db` service (image, user/password/db, port 5432). The
      # pgvector image (Postgres 16 + the vector extension) lets migration d5f2b8c3a1e9
      # install the extension, so this matrix also exercises the G83 DB-side cosine fast path
      # and its parity tests; embeddings otherwise remain a JSON column and full-text search
      # uses core to_tsvector/ts_rank.
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: deallens
          POSTGRES_PASSWORD: deallens
          POSTGRES_DB: deallens
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U deallens -d deallens"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/api/requirements.lock
      # Unchanged hashed install. The Postgres driver (psycopg + psycopg-binary) is ALREADY
      # pinned with hashes in requirements.lock, so this base install provides it — no
      # lockfile regeneration and no un-hashed install step are needed for this job.
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-build-isolation --no-deps -e .
      - run: python -m pip install pytest==9.1.1
      - name: Migrate a blank Postgres database
        run: python -m alembic -c alembic.ini upgrade head
      - name: Assert migration metadata is current (Postgres)
        run: python -m alembic -c alembic.ini check
      - name: Test on Postgres
        env:
          # conftest honors DEALLENS_TEST_DATABASE_URL and otherwise defaults to SQLite,
          # so the same suite targets the Postgres service here. Schema is created from
          # metadata (create_all) for the run; `alembic check` above guarantees that
          # schema is identical to the migrated one validated in the previous step.
          DEALLENS_TEST_DATABASE_URL: postgresql+psycopg://deallens:deallens@localhost:5432/deallens
        run: python -m pytest

  web:
    name: Web · Node 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL_INTERNAL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  compose:
    name: Production containers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose build api web
      - name: Boot Postgres, API, and web
        run: docker compose up -d --wait db api web
      - name: Smoke API and same-origin SSR proxy
        run: |
          curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:8000/api/health
          curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:3000/login
          curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:3000/backend/api/health
      - name: Container logs
        if: failure()
        run: docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down --volumes

name: quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  api:
    name: API · Python 3.12
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      LLM_MODE: mock
      AUTO_SEED: "false"
      DATABASE_URL: sqlite:///./ci.sqlite3
      SEC_USER_AGENT: DealLens CI contact@example.com
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/api/pyproject.toml
            apps/api/requirements.lock
      - run: python -m pip install --require-hashes -r requirements.lock
      - run: python -m pip install --no-build-isolation --no-deps -e .
      - run: python -m pip install pytest==9.1.1 ruff==0.15.21
      - run: python -m pip check
      - name: Lint
        run: python -m ruff check src tests migrations
      - name: Migrate a blank database
        run: python -m alembic -c alembic.ini upgrade head
      - name: Assert migration metadata is current
        run: python -m alembic -c alembic.ini check
      # Explicit retrieval-eval + abstention-calibration gate (G03/G06). These are ordinary
      # pytest tests, so the full "Test" step below already runs them; this step surfaces the
      # regression gate as its own CI signal — it fails if any ranker slips below the committed
      # baseline in src/eval/retrieval_metrics.json or the calibrated thresholds drift.
      - name: Retrieval eval + calibration gate
        env:
          DATABASE_URL: sqlite:///./ci-eval.sqlite3
          SCHEMA_MANAGEMENT: create_all
        run: python -m pytest tests/test_retrieval_eval.py tests/test_calibration.py -q
      - name: Test
        env:
          DATABASE_URL: sqlite:///./ci-tests.sqlite3
          SCHEMA_MANAGEMENT: create_all
        run: python -m pytest

  web:
    name: Web · Node 20
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL_INTERNAL: http://localhost:8000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm test
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  compose:
    name: Production containers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose build api web
      - name: Boot Postgres, API, and web
        run: docker compose up -d --wait db api web
      - name: Smoke API and same-origin SSR proxy
        run: |
          curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:8000/api/health
          curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:3000/login
          curl --fail --retry 10 --retry-connrefused --retry-delay 2 http://127.0.0.1:3000/backend/api/health
      - name: Container logs
        if: failure()
        run: docker compose logs --no-color
      - name: Stop stack
        if: always()
        run: docker compose down --volumes

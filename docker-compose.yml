# DealLens Diligence Lab — local production-shaped stack (Postgres + pgvector).
# For a zero-dependency run, use SQLite + local dev instead (see README Option B).

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: deallens
      POSTGRES_PASSWORD: deallens
      POSTGRES_DB: deallens
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deallens -d deallens"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
    environment: &api-environment
      LLM_MODE: ${LLM_MODE:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com/v1}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
      DATABASE_URL: postgresql+psycopg://deallens:deallens@db:5432/deallens
      SCHEMA_MANAGEMENT: external
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      AUTO_SEED: ${AUTO_SEED:-false}
      SEED_ORGANIZATION_SLUG: ${SEED_ORGANIZATION_SLUG:-}
      AUTH_REQUIRED: ${AUTH_REQUIRED:-true}
      AUTH_ALLOW_REGISTRATION: ${AUTH_ALLOW_REGISTRATION:-false}
      AUTH_RATE_LIMIT_ATTEMPTS: ${AUTH_RATE_LIMIT_ATTEMPTS:-30}
      AUTH_RATE_LIMIT_WINDOW_SECONDS: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      WEBHOOK_ENCRYPTION_KEY: ${WEBHOOK_ENCRYPTION_KEY:-}
      WEBHOOK_ALLOW_INSECURE_HTTP: ${WEBHOOK_ALLOW_INSECURE_HTTP:-false}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-DealLens Diligence Lab (portfolio project) contact@example.com}
      FRED_API_KEY: ${FRED_API_KEY:-}
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 5s
      retries: 20

  webhook-worker:
    build:
      context: ./apps/api
    command: ["python", "-m", "src.workers.webhooks"]
    environment:
      DATABASE_URL: postgresql+psycopg://deallens:deallens@db:5432/deallens
      SCHEMA_MANAGEMENT: external
      WEBHOOK_ENCRYPTION_KEY: ${WEBHOOK_ENCRYPTION_KEY:-}
      WEBHOOK_ALLOW_INSECURE_HTTP: ${WEBHOOK_ALLOW_INSECURE_HTTP:-false}
      AUTO_SEED: "false"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  build-worker:
    build:
      context: ./apps/api
    command: ["python", "-m", "src.workers.jobs"]
    environment:
      DATABASE_URL: postgresql+psycopg://deallens:deallens@db:5432/deallens
      SCHEMA_MANAGEMENT: external
      LLM_MODE: ${LLM_MODE:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com/v1}
      LLM_MODEL: ${LLM_MODEL:-claude-opus-4-8}
      SEC_USER_AGENT: ${SEC_USER_AGENT:-DealLens Diligence Lab (portfolio project) contact@example.com}
      FRED_API_KEY: ${FRED_API_KEY:-}
      AUTO_SEED: "false"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/login').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
